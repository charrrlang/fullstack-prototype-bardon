<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts - Full-Stack App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="admin-header">
        <h1>Full-Stack (Yvone Bardon)</h1>
        <div class="auth-group">
            <div class="admin-dropdown">
                Admin <span class="arrow">▾</span>
                <div class="dropdown-menu">
                    <a href="admin.html">Profile</a>
                    <a href="employees.html">Employees</a>
                    <a href="departments.html">Departments</a>
                    <a href="accounts.html">Accounts</a>
                    <a href="request.html">My Requests</a>
                    <hr>
                    <a href="login.html" class="logout-link">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <main class="content-container">
        <div class="section-header">
            <h2>Accounts</h2>
            <button class="btn-add-account">+ Add Account</button>
        </div>

        <div class="table-container">
            <table class="employee-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Verified</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Admin User</td>
                        <td>admin@example.com</td>
                        <td>Admin</td>
                        <td><input type="checkbox" checked disabled></td>
                        <td>
                            <button class="btn-edit-outline">Edit</button>
                            <button class="btn-reset-outline">Reset Password</button>
                            <button class="btn-delete-outline">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="form-card">
            <div class="card-header">Add/Edit Account</div>
            <form class="employee-form">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select>
                        <option>User</option>
                        <option>Admin</option>
                    </select>
                </div>
                <div class="form-group-inline">
                    <input type="checkbox" id="verified">
                    <label for="verified">Verified</label>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-save">Save</button>
                    <button type="button" class="btn-cancel-dark">Cancel</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
