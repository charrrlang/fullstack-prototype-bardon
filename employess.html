<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - Full-Stack App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="admin-header">
        <h1>Full-Stack App</h1>
        <div class="auth-group">
            <div class="admin-dropdown">
                Admin <span class="arrow">▾</span>
                <div class="dropdown-menu">
                    <a href="admin.html">Profile</a>
                    <a href="employees.html">Employees</a>
                    <a href="departments.html">Departments</a>
                    <a href="accounts.html">Accounts</a>
                    <hr>
                    <a href="login.html" class="logout-link">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <main class="content-container">
        <div class="section-header">
            <h2>Employees</h2>
            <button class="btn-add">+ Add Employee</button>
        </div>

        <div class="table-container">
            <table class="employee-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Position</th>
                        <th>Dept</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" class="empty-msg">No employees.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="form-card">
            <div class="card-header">Add/Edit Employee</div>
            <form class="employee-form">
                <div class="form-group">
                    <label>Employee ID</label>
                    <input type="text">
                </div>
                <div class="form-group">
                    <label>User Email</label>
                    <input type="email">
                </div>
                <div class="form-group">
                    <label>Position</label>
                    <input type="text">
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select>
                        <option>Engineering</option>
                        <option>Marketing</option>
                        <option>HR</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Hire Date</label>
                    <input type="date">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-save">Save</button>
                    <button type="button" class="btn-cancel-dark">Cancel</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
