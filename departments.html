<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - Full-Stack App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="admin-header">
        <h1>Full-Stack (Yvone Bardon)</h1>
        <div class="auth-group">
            <div class="admin-dropdown">
                Admin <span class="arrow">▾</span>
                <div class="dropdown-menu">
                    <a href="admin.html">Profile</a>
                    <a href="employees.html">Employees</a>
                    <a href="departments.html">Departments</a>
                    <a href="accounts.html">Accounts</a>
                    <a href="request.html">My Requests</a>
                    <hr>
                    <a href="login.html" class="logout-link">Logout</a>
                </div>
            </div>
        </div>
    </header>
    <main class="content-container">
    <div class="section-header">
        <h2>Departments</h2>
        <button class="btn-add-dept">+ Add Department</button>
    </div>

    <div class="table-container">
        <table class="employee-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Engineering</td>
                    <td>Software team</td>
                    <td>
                        <button class="btn-edit-outline">Edit</button>
                        <button class="btn-delete-outline">Delete</button>
                    </td>
                </tr>
                <tr>
                    <td>HR</td>
                    <td>Human Resources</td>
                    <td>
                        <button class="btn-edit-outline">Edit</button>
                        <button class="btn-delete-outline">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
