<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Email</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Full-Stack App</h1>
    </header>

    <section class="form-container">
        <div class="form-box">
            <h2>Verify Your Email</h2>
            
            <div class="alert-success">
                ✅ A verification link has been sent to your email.
            </div>

            <p>For demo purposes, click below to simulate verification:</p>
            
            <div class="form-actions">
                <button id="simulate-btn" class="btn-signup">Simulate Email Verification</button>
                <a href="login.html" id="go-to-login" class="btn-cancel" style="display:none;">Go to Login</a>
            </div>
        </div>
    </section>

    <script src="verify.js"></script>
</body>
</html>
